<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<meta name="referrer" content="no-referrer"/>
<title>—</title>
<style>
:root {
  --paper: #FBF9F4;
  --paper2: #FDFCFA;
  --card: #FFFFFF;
  --ink: #0A3F42;
  --ink-mute: #5A7577;
  --rule: #B8985A;
  --rule-soft: #EEE6D6;
  --accent: #6E1E2B;
  --teal: #0D7377;
  --teal-mute: #3B7877;
  --gold: #C88A1D;
  --gold-mute: #A88B54;
  --sage: #7A8B6E;
  --coral: #E8846B;
  --red: #C0392B;
  --chart-1: #0D7377;
  --chart-2: #6E1E2B;
  --chart-3: #C88A1D;
  --chart-4: #3E7C4A;
  --chart-5: #6E4D8C;
  --chart-6: #2F5D66;
  --chart-7: #B2813A;
  --chart-8: #E8846B;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
  font-size: 14px; line-height: 1.5; }
a { color: var(--teal); text-decoration: none; }
a:hover { text-decoration: underline; }

.layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
nav.sidebar { background: var(--paper2); border-right: 1px solid var(--rule-soft);
  padding: 28px 18px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
nav .brand { font-family: Georgia, serif; font-weight: 600; font-size: 20px;
  letter-spacing: 0.5px; color: var(--ink); margin-bottom: 4px; }
nav .brand-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 1.8px;
  color: var(--ink-mute); margin-bottom: 24px; }
nav ul { list-style: none; padding: 0; margin: 0 0 24px 0; }
nav li { margin: 2px 0; }
nav a.tab { display: block; padding: 8px 12px; border-radius: 6px; color: var(--ink);
  font-size: 13px; font-weight: 500; border: 1px solid transparent; }
nav a.tab:hover { background: var(--rule-soft); text-decoration: none; }
nav a.tab.active { background: var(--card); border-color: var(--rule);
  color: var(--ink); box-shadow: 0 1px 2px rgba(10,63,66,0.06); }
nav .group-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.6px;
  color: var(--ink-mute); padding: 14px 12px 6px; font-weight: 600; }
nav .foot { font-size: 10px; color: var(--ink-mute); margin-top: auto;
  padding-top: 16px; border-top: 1px solid var(--rule-soft); }

main { padding: 32px 40px; max-width: 1400px; }
main > header { display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--rule); padding-bottom: 14px; margin-bottom: 24px; }
main > header h1 { font-family: Georgia, serif; font-weight: 600; font-size: 28px;
  margin: 0; color: var(--ink); }
main > header .meta { font-size: 11px; color: var(--ink-mute); text-transform: uppercase;
  letter-spacing: 1.4px; }
main > header button { font: inherit; font-size: 12px; background: transparent;
  border: 1px solid var(--rule); color: var(--ink); padding: 6px 12px; border-radius: 4px;
  cursor: pointer; margin-left: 10px; }
main > header button:hover { background: var(--rule-soft); }

#content { min-height: 200px; }
#content.loading { opacity: 0.5; }

.blocks { display: flex; flex-direction: column; gap: 20px; }

.section-title { font-family: Georgia, serif; font-size: 18px; font-weight: 600;
  color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin: 16px 0 4px; }
.section-title .sub { font-family: -apple-system, sans-serif; font-size: 12px;
  text-transform: none; letter-spacing: 0; color: var(--ink-mute); font-weight: 400;
  margin-left: 10px; }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
.kpi { background: var(--card); border: 1px solid var(--rule-soft); border-radius: 8px;
  padding: 16px 18px; }
.kpi .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--ink-mute); margin-bottom: 6px; font-weight: 600; }
.kpi .value { font-family: Georgia, serif; font-size: 32px; font-weight: 600;
  line-height: 1; color: var(--ink); }
.kpi .value.teal { color: var(--teal); }
.kpi .value.gold { color: var(--gold); }
.kpi .value.oxblood { color: var(--accent); }
.kpi .value.muted { color: var(--ink-mute); }
.kpi .sub { font-size: 11px; color: var(--ink-mute); margin-top: 6px; }
.kpi .trend { font-size: 11px; margin-top: 6px; font-weight: 600; }
.kpi .trend.up { color: #2F7A3C; }
.kpi .trend.down { color: var(--red); }
.kpi .trend.flat { color: var(--ink-mute); }

.card { background: var(--card); border: 1px solid var(--rule-soft); border-radius: 8px;
  padding: 18px 20px; }
.card > .title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--ink-mute); font-weight: 600; margin-bottom: 4px; }
.card > .sub { font-size: 12px; color: var(--ink-mute); margin-bottom: 14px; }

.callout { padding: 14px 18px; border-radius: 8px; border: 1px solid var(--rule-soft);
  background: var(--card); }
.callout .title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--ink-mute); font-weight: 600; margin-bottom: 4px; }
.callout .body { font-size: 13px; color: var(--ink); }
.callout.warn { border-left: 3px solid var(--gold); }
.callout.positive { border-left: 3px solid var(--teal); }
.callout.muted { border-left: 3px solid var(--ink-mute); }

.sparkline-wrap { display: flex; align-items: center; gap: 20px; padding: 8px 0; }
.sparkline-wrap .spark-label { font-size: 13px; font-weight: 500; color: var(--ink);
  min-width: 180px; }
.sparkline-wrap .spark-sub { font-size: 11px; color: var(--ink-mute); }

svg.chart { display: block; width: 100%; height: auto; }
svg.chart .axis { stroke: var(--rule-soft); stroke-width: 1; }
svg.chart .axis-label { fill: var(--ink-mute); font-size: 10px; text-transform: uppercase;
  letter-spacing: 1px; }
svg.chart .tick-label { fill: var(--ink-mute); font-size: 10px; }
svg.chart .grid { stroke: var(--rule-soft); stroke-width: 1; stroke-dasharray: 2 3; }

.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; font-size: 11px;
  color: var(--ink-mute); }
.legend .item { display: flex; align-items: center; gap: 6px; }
.legend .swatch { width: 10px; height: 10px; border-radius: 2px; }

table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data th { text-align: left; padding: 10px 12px; background: #FBF6EA;
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-mute);
  font-weight: 600; border-bottom: 1px solid var(--rule-soft); }
table.data td { padding: 10px 12px; border-bottom: 1px solid var(--rule-soft); }
table.data tr:last-child td { border-bottom: none; }
table.data td.num { font-variant-numeric: tabular-nums; text-align: right; }
table.data td.email { font-family: ui-monospace, Menlo, monospace; font-size: 12px;
  color: var(--ink-mute); }
table.data td.accent { color: var(--accent); font-weight: 600; }
table.data tr:hover td { background: #FDF9EE; }

table.cohort { width: 100%; border-collapse: separate; border-spacing: 2px; font-size: 11px;
  font-variant-numeric: tabular-nums; }
table.cohort th { padding: 6px 8px; font-size: 10px; color: var(--ink-mute);
  font-weight: 600; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
table.cohort th.row-head { text-align: left; }
table.cohort td { padding: 8px 6px; text-align: center; border-radius: 3px; color: var(--ink); }
table.cohort td.row-head { text-align: left; background: transparent; color: var(--ink-mute);
  font-weight: 500; padding-left: 0; }
table.cohort td.null { background: #F2ECDE; color: transparent; }

#status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: var(--teal); margin-right: 6px; vertical-align: middle; }
#status-dot.error { background: var(--red); }
#status-dot.loading { background: var(--gold); }

.error-banner { background: #FBE9E6; border: 1px solid var(--red); color: var(--red);
  padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  nav.sidebar { position: static; height: auto; }
  main { padding: 20px; }
}
</style>
</head>

<script>
// ── Block renderers ──────────────────────────────────────────────────────────
const fmtInt = n => (n == null ? '—' : Math.round(n).toLocaleString());
const fmtFloat1 = n => (n == null ? '—' : Number(n).toFixed(1));
const fmtPct = n => (n == null ? '—' : Number(n).toFixed(1) + '%');
const fmtDate = s => { if (!s) return '—'; const d = new Date(s); if (isNaN(d)) return s;
  return d.toISOString().slice(0,10); };
const fmtDateTime = s => { if (!s) return '—'; const d = new Date(s); if (isNaN(d)) return s;
  return d.toISOString().replace('T',' ').slice(0,19); };
const fmtVal = (v, fmt) => {
  if (v == null) return '—';
  if (fmt === 'int') return fmtInt(v);
  if (fmt === 'pct') return fmtPct(v);
  if (fmt === 'float1') return fmtFloat1(v);
  if (fmt === 'date') return fmtDate(v);
  if (fmt === 'email') return v;
  return v;
};
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function renderKpi(b) {
  const trendClass = b.trend == null ? '' : (b.trend > 0.01 ? 'up' : b.trend < -0.01 ? 'down' : 'flat');
  const trendArrow = b.trend == null ? '' : (b.trend > 0.01 ? '▲' : b.trend < -0.01 ? '▼' : '·');
  const trendHtml = b.trend == null ? '' :
    `<div class="trend ${trendClass}">${trendArrow} ${fmtPct(Math.abs(b.trend)*100)}</div>`;
  return `<div class="kpi">
    <div class="label">${esc(b.label)}</div>
    <div class="value ${esc(b.tone||'ink')}">${esc(b.value)}</div>
    ${b.sub ? `<div class="sub">${esc(b.sub)}</div>` : ''}
    ${trendHtml}
  </div>`;
}
function renderKpiRow(b) {
  return `<div class="kpi-row">${b.cards.map(renderKpi).join('')}</div>`;
}
function renderSectionTitle(b) {
  return `<div class="section-title">${esc(b.label)}${b.sub ? `<span class="sub">${esc(b.sub)}</span>` : ''}</div>`;
}
function renderCallout(b) {
  return `<div class="callout ${esc(b.tone||'muted')}">
    <div class="title">${esc(b.label)}</div>
    <div class="body">${esc(b.body)}</div>
  </div>`;
}
function renderSparkline(b) {
  const svg = drawSparkline(b.points, b.color);
  return `<div class="card"><div class="sparkline-wrap">
    <div>
      <div class="spark-label">${esc(b.label)}</div>
      ${b.sub ? `<div class="spark-sub">${esc(b.sub)}</div>` : ''}
    </div>
    <div style="flex:1">${svg}</div>
  </div></div>`;
}
function drawSparkline(points, color) {
  if (!points || !points.length) return '<div class="spark-sub">no data</div>';
  const w = 300, h = 40, pad = 2;
  const ys = points.map(p => p[1]);
  const maxY = Math.max(...ys, 0) || 1;
  const minY = Math.min(...ys, 0);
  const range = (maxY - minY) || 1;
  const step = points.length > 1 ? (w - 2*pad) / (points.length - 1) : 0;
  const path = points.map((p, i) => {
    const x = pad + i * step;
    const y = h - pad - ((p[1] - minY) / range) * (h - 2*pad);
    return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${path}" fill="none" stroke="${color||'#0D7377'}" stroke-width="1.5"/>
  </svg>`;
}
function renderLineChart(b) {
  const svg = drawLineChart(b.series, b.y_label);
  const legend = b.series.length > 1 ? `<div class="legend">${b.series.map(s =>
    `<div class="item"><span class="swatch" style="background:${esc(s.color)}"></span>${esc(s.name)}</div>`
  ).join('')}</div>` : '';
  return `<div class="card">
    <div class="title">${esc(b.label)}</div>
    ${b.sub ? `<div class="sub">${esc(b.sub)}</div>` : ''}
    ${svg}
    ${legend}
  </div>`;
}
function drawLineChart(series, yLabel) {
  const w = 900, h = 260, padL = 44, padR = 20, padT = 16, padB = 36;
  const iw = w - padL - padR, ih = h - padT - padB;
  const allPts = series.flatMap(s => s.points);
  if (!allPts.length) return '<div class="spark-sub">no data</div>';
  const xs = Array.from(new Set(allPts.map(p => p[0])));
  const ys = allPts.map(p => p[1]);
  const maxY = Math.max(...ys, 0) || 1;
  const minY = Math.min(0, Math.min(...ys));
  const range = (maxY - minY) || 1;
  const xIdx = Object.fromEntries(xs.map((x, i) => [x, i]));
  const stepX = xs.length > 1 ? iw / (xs.length - 1) : 0;
  const tickCount = Math.min(xs.length, 8);
  const tickStep = Math.max(1, Math.floor(xs.length / tickCount));
  const xTicks = xs.map((x, i) => ({x, i})).filter(o => o.i % tickStep === 0);
  const yTicks = 4;
  const gridLines = [];
  for (let i = 0; i <= yTicks; i++) {
    const v = minY + (range * i / yTicks);
    const y = padT + ih - ((v - minY) / range) * ih;
    gridLines.push(`<line class="grid" x1="${padL}" y1="${y}" x2="${padL+iw}" y2="${y}"/>`);
    gridLines.push(`<text class="tick-label" x="${padL-6}" y="${y+3}" text-anchor="end">${fmtInt(v)}</text>`);
  }
  const xLabels = xTicks.map(({x, i}) => {
    const px = padL + i * stepX;
    const short = String(x).length > 10 ? String(x).slice(-5) : String(x);
    return `<text class="tick-label" x="${px}" y="${padT+ih+14}" text-anchor="middle">${esc(short)}</text>`;
  }).join('');
  const paths = series.map(s => {
    const d = s.points.map((p, i) => {
      const x = padL + (xIdx[p[0]] ?? 0) * stepX;
      const y = padT + ih - ((p[1] - minY) / range) * ih;
      return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    return `<path d="${d}" fill="none" stroke="${esc(s.color)}" stroke-width="2"/>`;
  }).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    ${gridLines.join('')}
    ${paths}
    ${xLabels}
    <line class="axis" x1="${padL}" y1="${padT+ih}" x2="${padL+iw}" y2="${padT+ih}"/>
  </svg>`;
}
function renderBarChart(b) {
  const svg = drawBarChart(b.bars, b.color, b.horizontal, b.format);
  return `<div class="card">
    <div class="title">${esc(b.label)}</div>
    ${b.sub ? `<div class="sub">${esc(b.sub)}</div>` : ''}
    ${svg}
  </div>`;
}
function drawBarChart(bars, color, horizontal, format) {
  if (!bars || !bars.length) return '<div class="spark-sub">no data</div>';
  const w = 900, h = Math.max(260, horizontal ? bars.length * 26 + 40 : 260);
  const padL = horizontal ? 200 : 44, padR = 20, padT = 16, padB = 42;
  const iw = w - padL - padR, ih = h - padT - padB;
  const maxV = Math.max(...bars.map(b => b[1]), 0) || 1;
  const fmt = v => fmtVal(v, format || 'int');
  if (horizontal) {
    const step = bars.length > 0 ? ih / bars.length : 0;
    const rows = bars.map(([lbl, v], i) => {
      const barW = Math.max(0, (v / maxV) * iw);
      const y = padT + i * step + step*0.1;
      const barH = step * 0.8;
      return `<rect x="${padL}" y="${y}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}"
        fill="${color||'#0D7377'}" opacity="0.85"/>
        <text class="tick-label" x="${padL-8}" y="${y + barH/2 + 4}" text-anchor="end">${esc(lbl)}</text>
        <text class="tick-label" x="${padL + barW + 6}" y="${y + barH/2 + 4}" fill="var(--ink)">${fmt(v)}</text>`;
    }).join('');
    return `<svg class="chart" viewBox="0 0 ${w} ${h}">${rows}</svg>`;
  } else {
    const step = bars.length > 0 ? iw / bars.length : 0;
    const barW = Math.max(4, step * 0.7);
    const cols = bars.map(([lbl, v], i) => {
      const barH = Math.max(0, (v / maxV) * ih);
      const x = padL + i * step + (step - barW)/2;
      const y = padT + ih - barH;
      const short = String(lbl).length > 12 ? String(lbl).slice(0,10)+'…' : String(lbl);
      return `<rect x="${x}" y="${y}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}"
        fill="${color||'#0D7377'}" opacity="0.85"/>
        <text class="tick-label" x="${x + barW/2}" y="${padT+ih+14}" text-anchor="middle">${esc(short)}</text>
        <text class="tick-label" x="${x + barW/2}" y="${y - 4}" text-anchor="middle" fill="var(--ink)">${fmt(v)}</text>`;
    }).join('');
    return `<svg class="chart" viewBox="0 0 ${w} ${h}">${cols}
      <line class="axis" x1="${padL}" y1="${padT+ih}" x2="${padL+iw}" y2="${padT+ih}"/>
    </svg>`;
  }
}
function renderStackedBar(b) {
  const svg = drawStackedBar(b.x_labels, b.series);
  const legend = `<div class="legend">${b.series.map(s =>
    `<div class="item"><span class="swatch" style="background:${esc(s.color)}"></span>${esc(s.name)}</div>`
  ).join('')}</div>`;
  return `<div class="card">
    <div class="title">${esc(b.label)}</div>
    ${b.sub ? `<div class="sub">${esc(b.sub)}</div>` : ''}
    ${svg}
    ${legend}
  </div>`;
}
function drawStackedBar(xs, series) {
  if (!xs || !xs.length) return '<div class="spark-sub">no data</div>';
  const w = 900, h = 260, padL = 44, padR = 20, padT = 16, padB = 36;
  const iw = w - padL - padR, ih = h - padT - padB;
  const totals = xs.map((_, i) => series.reduce((sum, s) => sum + (s.values[i]||0), 0));
  const maxV = Math.max(...totals, 0) || 1;
  const step = xs.length ? iw / xs.length : 0;
  const barW = Math.max(4, step * 0.7);
  const tickStep = Math.max(1, Math.floor(xs.length / 8));
  let svgParts = [];
  xs.forEach((x, i) => {
    let yCursor = padT + ih;
    const cx = padL + i * step + (step - barW)/2;
    series.forEach(s => {
      const v = s.values[i] || 0;
      const bh = (v / maxV) * ih;
      yCursor -= bh;
      if (bh > 0) {
        svgParts.push(`<rect x="${cx}" y="${yCursor}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${esc(s.color)}" opacity="0.9"/>`);
      }
    });
    if (i % tickStep === 0) {
      const short = String(x).length > 10 ? String(x).slice(-5) : String(x);
      svgParts.push(`<text class="tick-label" x="${cx + barW/2}" y="${padT+ih+14}" text-anchor="middle">${esc(short)}</text>`);
    }
  });
  for (let i = 0; i <= 4; i++) {
    const v = maxV * i / 4;
    const y = padT + ih - (v / maxV) * ih;
    svgParts.push(`<line class="grid" x1="${padL}" y1="${y}" x2="${padL+iw}" y2="${y}"/>`);
    svgParts.push(`<text class="tick-label" x="${padL-6}" y="${y+3}" text-anchor="end">${fmtInt(v)}</text>`);
  }
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${svgParts.join('')}
    <line class="axis" x1="${padL}" y1="${padT+ih}" x2="${padL+iw}" y2="${padT+ih}"/>
  </svg>`;
}
function renderCohort(b) {
  const cols = b.col_headers, rows = b.row_headers, m = b.matrix, fmt = b.format || 'pct';
  const allVals = m.flat().filter(v => v != null);
  const maxV = Math.max(...allVals, 0.0001);
  const cellBg = v => {
    if (v == null) return 'var(--rule-soft)';
    const t = Math.max(0, Math.min(1, v / maxV));
    // teal gradient
    const r = Math.round(251 - (251-13) * t);
    const g = Math.round(249 - (249-115) * t);
    const bl = Math.round(244 - (244-119) * t);
    return `rgb(${r},${g},${bl})`;
  };
  const cellColor = v => (v == null ? 'var(--ink-mute)' : (v/maxV > 0.5 ? '#FFFFFF' : 'var(--ink)'));
  const fmtCell = v => v == null ? '' : (fmt === 'pct' ? fmtPct(v) : fmt === 'int' ? fmtInt(v) : fmtFloat1(v));
  const head = `<tr><th class="row-head">Cohort</th>${cols.map(c => `<th>${esc(c)}</th>`).join('')}</tr>`;
  const body = m.map((row, i) => `<tr>
    <td class="row-head">${esc(rows[i])}</td>
    ${row.map(v => `<td style="background:${cellBg(v)};color:${cellColor(v)}">${fmtCell(v)}</td>`).join('')}
  </tr>`).join('');
  return `<div class="card">
    <div class="title">${esc(b.label)}</div>
    ${b.sub ? `<div class="sub">${esc(b.sub)}</div>` : ''}
    <table class="cohort"><thead>${head}</thead><tbody>${body}</tbody></table>
  </div>`;
}
function renderTable(b) {
  const formats = b.formats || b.headers.map(() => 'text');
  const head = `<tr>${b.headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr>`;
  const body = b.rows.map(r => `<tr>${r.map((c, i) => {
    const fmt = formats[i] || 'text';
    const num = (fmt === 'int' || fmt === 'pct' || fmt === 'float1');
    const cls = [num ? 'num' : '', fmt === 'email' ? 'email' : '', i === b.accent_col ? 'accent' : ''].filter(Boolean).join(' ');
    return `<td ${cls ? `class="${cls}"`:''}>${esc(fmtVal(c, fmt))}</td>`;
  }).join('')}</tr>`).join('');
  return `<div class="card">
    <div class="title">${esc(b.label)}</div>
    ${b.sub ? `<div class="sub">${esc(b.sub)}</div>` : ''}
    <table class="data"><thead>${head}</thead><tbody>${body}</tbody></table>
  </div>`;
}

const RENDERERS = {
  kpi: renderKpi, kpi_row: renderKpiRow, section_title: renderSectionTitle,
  callout: renderCallout, sparkline: renderSparkline, line_chart: renderLineChart,
  bar_chart: renderBarChart, stacked_bar: renderStackedBar, cohort: renderCohort,
  table: renderTable,
};
function renderBlocks(blocks) {
  return `<div class="blocks">${blocks.map(b => {
    const r = RENDERERS[b.type];
    return r ? r(b) : `<div class="callout warn"><div class="title">unknown block</div><div class="body">${esc(b.type)}</div></div>`;
  }).join('')}</div>`;
}

</script>
<script>
// ── Static-mode boot: decrypt window.__CT__ with token from URL hash ─────────
const _b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function _decryptPayload(token) {
  const salt = _b64(window.__SALT__);
  const nonce = _b64(window.__NONCE__);
  const ct = _b64(window.__CT__);
  const baseKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(token), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: window.__ITERS__, hash: 'SHA-256' },
    baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
function _showNothing(msg) {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;
                font-family:Georgia,serif;color:#0A3F42;background:#FBF9F4;">
      <div style="text-align:center">
        <div style="font-size:64px;font-weight:600">404</div>
        <div style="font-size:13px;color:#5A7577;margin-top:6px;letter-spacing:1px">
          ${msg || 'Nothing here.'}
        </div>
      </div>
    </div>`;
}

let TABS = [];
let DATA = {};
let GENERATED_AT = '';

function _hashParts() {
  const h = (location.hash || '').replace(/^#/, '');
  const i = h.indexOf('/');
  return i === -1 ? [h, ''] : [h.slice(0, i), h.slice(i + 1)];
}
function currentTabId() {
  const [, tab] = _hashParts();
  return tab || (TABS[0] && TABS[0].id);
}
function setTabRoute(id) {
  const [tok] = _hashParts();
  if (tok) location.hash = '#' + tok + '/' + id;
}
function loadTab(id) {
  document.querySelectorAll('nav a.tab').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  const cur = TABS.find(t => t.id === id) || TABS[0];
  if (!cur) return;
  document.title = `Zain — ${cur.title}`;
  document.querySelector('main > header h1').textContent = cur.title;
  const content = document.getElementById('content');
  const body = DATA[cur.id] || { blocks: [] };
  content.innerHTML = renderBlocks(body.blocks || []);
  document.getElementById('footer').textContent =
    `Snapshot · ${GENERATED_AT} · rebuilds on schedule`;
  document.getElementById('status-dot').className = '';
}
window.addEventListener('hashchange', () => loadTab(currentTabId()));

(async function _boot() {
  const [token] = _hashParts();
  if (!token) { _showNothing(); return; }
  let payload;
  try {
    payload = await _decryptPayload(token);
  } catch (e) {
    _showNothing('Invalid key.');
    return;
  }
  TABS = payload.tabs || [];
  DATA = payload.data || {};
  GENERATED_AT = payload.generated_at || '';
  const meta = document.querySelector('main > header .meta');
  if (meta) meta.innerHTML =
    `<span style="font-size:11px;color:#5A7577;letter-spacing:1.4px;text-transform:uppercase">snapshot · ${esc(GENERATED_AT)}</span>`;
  const nav = document.getElementById('nav-tabs');
  const groups = {};
  TABS.forEach(t => { (groups[t.group || 'Main'] ||= []).push(t); });
  nav.innerHTML = Object.entries(groups).map(([g, ts]) => `
    <div class="group-label">${esc(g)}</div>
    <ul>${ts.map(t =>
      `<li><a class="tab" data-id="${esc(t.id)}" href="#${esc(token)}/${esc(t.id)}">${esc(t.title)}</a></li>`
    ).join('')}</ul>
  `).join('');
  loadTab(currentTabId());
})();
</script>
